<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Delivery</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    header { background: #ff4d4d; color: white; padding: 15px; text-align: center; }
    .container { padding: 20px; }
    .menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
    .item { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
    .item button { background: #ff4d4d; color: white; border: none; padding: 10px; cursor: pointer; }
    .cart { margin-top: 20px; background: white; padding: 15px; border-radius: 10px; }
    .cart button { background: green; color: white; border: none; padding: 10px; }
  </style>
</head>
<body>
  <header>
    <h1>Online Food Delivery</h1>
  </header>

  <div class="container">
    <h2>Menu</h2>
    <div class="menu" id="menu"></div>

    <div class="cart">
      <h2>Cart</h2>
      <ul id="cartList"></ul>
      <p>Total: ₹<span id="total">0</span></p>
      <button onclick="checkout()">Checkout</button>
    </div>
  </div>

  <script>
    const foodItems = [
      { name: "Pizza", price: 200 },
      { name: "Burger", price: 120 },
      { name: "Pasta", price: 150 },
      { name: "Biryani", price: 250 }
    ];

    let cart = [];

    function displayMenu() {
      const menuDiv = document.getElementById("menu");
      foodItems.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <h3>${item.name}</h3>
          <p>₹${item.price}</p>
          <button onclick="addToCart(${index})">Add to Cart</button>
        `;
        menuDiv.appendChild(div);
      });
    }

    function addToCart(index) {
      cart.push(foodItems[index]);
      updateCart();
    }

    function updateCart() {
      const cartList = document.getElementById("cartList");
      const totalSpan = document.getElementById("total");
      cartList.innerHTML = "";
      let total = 0;

      cart.forEach(item => {
        const li = document.createElement("li");
        li.textContent = `${item.name} - ₹${item.price}`;
        cartList.appendChild(li);
        total += item.price;
      });

      totalSpan.textContent = total;
    }

    function checkout() {
      if (cart.length === 0) {
        alert("Cart is empty!");
        return;
      }
      alert("Order placed successfully!");
      cart = [];
      updateCart();
    }

    displayMenu();
  </script>
</body>
</html>
